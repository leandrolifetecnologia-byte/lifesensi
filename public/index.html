<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supervisório · Life Tecnologia</title>
    <meta name="description" content="Supervisório de telemetria em tempo real — Life Tecnologia / LifeSense." />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="./brand/icon-dark-bg.svg" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="./brand/icon-dark-bg.svg" alt="" width="40" height="40" />
        </div>
        <div class="brand-text">
          <strong>LifeSense</strong>
          <span>Supervisório · Telemetria</span>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Conectando…</span>
      </div>
    </header>

    <main class="wrap">
      <nav class="tabs" id="tabs" aria-label="Selecionar medidor"></nav>

      <section class="meta-row">
        <div>
          <h1 id="deviceName">Carregando dispositivo…</h1>
          <p class="sub" id="deviceSub">—</p>
        </div>
        <div class="updated">
          <span class="label">Última atualização</span>
          <span class="value" id="lastUpdate">—</span>
        </div>
      </section>

      <section class="cards" id="cards" aria-live="polite">
        <!-- cards injetados via JS -->
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
      </section>

      <section class="chart-card" id="chartCard" hidden>
        <div class="chart-head">
          <h2>Histórico</h2>
          <span class="sub" id="chartSub"></span>
        </div>
        <div class="chart-holder">
          <canvas id="historyChart"></canvas>
        </div>
      </section>

      <section class="billing" id="billing" hidden>
        <div class="billing-head">
          <h2 id="billingTitle">Fatura · referência</h2>
          <span class="sub" id="billingSub"></span>
        </div>
        <div class="billing-metrics" id="billingMetrics"></div>
        <div class="billing-bars" id="billingBars" aria-label="Histórico de consumo faturado"></div>
      </section>

      <section class="debug" id="debug" hidden>
        <div class="debug-head">
          <h2>Dados brutos (debug)</h2>
          <button id="copyRaw" type="button">Copiar JSON</button>
        </div>
        <pre id="rawJson">—</pre>
      </section>

      <p class="foot">
        Fonte: plataforma Metam · Atualização automática a cada
        <span id="intervalLabel">60</span>s ·
        <a href="?debug=1">modo debug</a>
      </p>
    </main>

    <!-- Chart.js só é carregado se houver histórico; ver app.js -->
    <script src="./app.js" type="module"></script>
  </body>
</html>
