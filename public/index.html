<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supervisório · Life Tecnologia</title>
    <meta name="description" content="Supervisório de telemetria em tempo real — Life Tecnologia / LifeSense." />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236a46f5'/%3E%3Cpath d='M50 20c12 16 20 26 20 38a20 20 0 1 1-40 0c0-12 8-22 20-38z' fill='white'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 100 100" width="28" height="28">
            <path d="M50 16c14 19 24 31 24 45a24 24 0 1 1-48 0c0-14 10-26 24-45z" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand-text">
          <strong>LifeSense</strong>
          <span>Supervisório · Medição de Água</span>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Conectando…</span>
      </div>
    </header>

    <main class="wrap">
      <section class="meta-row">
        <div>
          <h1 id="deviceName">Carregando dispositivo…</h1>
          <p class="sub" id="deviceSub">—</p>
        </div>
        <div class="updated">
          <span class="label">Última atualização</span>
          <span class="value" id="lastUpdate">—</span>
        </div>
      </section>

      <section class="cards" id="cards" aria-live="polite">
        <!-- cards injetados via JS -->
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
      </section>

      <section class="chart-card" id="chartCard" hidden>
        <div class="chart-head">
          <h2>Histórico</h2>
          <span class="sub" id="chartSub"></span>
        </div>
        <div class="chart-holder">
          <canvas id="historyChart"></canvas>
        </div>
      </section>

      <section class="debug" id="debug" hidden>
        <div class="debug-head">
          <h2>Dados brutos (debug)</h2>
          <button id="copyRaw" type="button">Copiar JSON</button>
        </div>
        <pre id="rawJson">—</pre>
      </section>

      <p class="foot">
        Fonte: plataforma Metam · Atualização automática a cada
        <span id="intervalLabel">60</span>s ·
        <a href="?debug=1">modo debug</a>
      </p>
    </main>

    <!-- Chart.js só é carregado se houver histórico; ver app.js -->
    <script src="./app.js" type="module"></script>
  </body>
</html>
