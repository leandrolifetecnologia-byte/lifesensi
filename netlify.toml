[build]
  publish = "public"
  functions = "netlify/functions"

# Deixa a página chamar a função por um caminho curto: /api/metam
[[redirects]]
  from = "/api/metam"
  to = "/.netlify/functions/metam"
  status = 200

# O service worker não pode ficar em cache, senão o app instalado nunca
# recebe atualizações.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"
